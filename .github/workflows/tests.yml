name: Tests

on:
  push:
    branches: [ tests ]
  pull_request:
    branches: [ tests ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (including Jest and supertest)
        run: npm ci

      - name: Run Jest tests (unit + integration)
        run: npm run test:ci
